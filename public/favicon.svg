<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Purple rounded square background -->
  <rect width="100" height="100" rx="20" fill="#4c1d95"/>

  <!-- F letter (simplified FE monogram cross-bars) -->
  <!-- Vertical bar of F -->
  <rect x="14" y="18" width="10" height="64" rx="2" fill="white"/>
  <!-- Top horizontal bar of F -->
  <rect x="14" y="18" width="30" height="10" rx="2" fill="white"/>
  <!-- Middle horizontal bar of F -->
  <rect x="14" y="44" width="22" height="9" rx="2" fill="white"/>

  <!-- E letter -->
  <!-- Vertical bar of E -->
  <rect x="52" y="18" width="10" height="64" rx="2" fill="#f59e0b"/>
  <!-- Top horizontal bar of E -->
  <rect x="52" y="18" width="30" height="10" rx="2" fill="#f59e0b"/>
  <!-- Middle horizontal bar of E -->
  <rect x="52" y="44" width="24" height="9" rx="2" fill="#f59e0b"/>
  <!-- Bottom horizontal bar of E -->
  <rect x="52" y="72" width="30" height="10" rx="2" fill="#f59e0b"/>
</svg>
